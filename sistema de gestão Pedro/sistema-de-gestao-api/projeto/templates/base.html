<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Web de Gestão</title>

<style>

:root{
    --primary:#4a235a;      /* Roxo escuro */
    --accent:#af7ac5;       /* Roxo claro */
    --danger:#c0392b;
    --success:#28b463;
    --light:#f8f9f9;
    --white:#ffffff;
    --dark:#1c1c1c;
    --border:#d5d8dc;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Verdana, Geneva, Tahoma, sans-serif;
}

body{
    background-color:var(--light);
    color:var(--dark);
}

/* NAVBAR */

.navbar{
    background:var(--primary);
    padding:15px 6%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
}

/* título centralizado */
.navbar-brand{
    color:var(--white);
    font-size:24px;
    font-weight:bold;
    text-decoration:none;
}

/* links abaixo do título */
.nav-links{
    display:flex;
    gap:15px;
}

.nav-links a{
    color:var(--white);
    text-decoration:none;
    padding:6px 12px;
    border-radius:4px;
    font-size:14px;
}

.nav-links a:hover{
    background:var(--accent);
}

/* CONTAINER */

.container{
    max-width:950px;
    margin:40px auto;
    padding:25px;
    background:var(--white);
    border:1px solid var(--border);
    border-radius:5px;
}

/* TABELAS */

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th{
    background:var(--accent);
    color:white;
    padding:12px;
    text-align:center;
}

td{
    padding:12px;
    border-bottom:1px solid var(--border);
    text-align:center;
}

tr:nth-child(even){
    background:#f2f2f2;
}

/* FORMULÁRIOS */

form p{
    margin-bottom:14px;
}

label{
    display:block;
    margin-bottom:4px;
    font-weight:bold;
}

input[type="text"],
input[type="email"],
input[type="number"],
input[type="date"],
select{
    width:100%;
    padding:8px;
    border:1px solid var(--border);
    border-radius:4px;
}

/* BOTÕES */

.btn,button,input[type="submit"]{
    background:var(--primary);
    color:white;
    padding:8px 16px;
    border:none;
    border-radius:4px;
    cursor:pointer;
    text-decoration:none;
    font-size:14px;
}

.btn:hover,button:hover,input[type="submit"]:hover{
    background:var(--accent);
}

.btn-danger{
    background:var(--danger);
}

.btn-success{
    background:var(--success);
}

/* UTILITÁRIOS */

.d-flex{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.text-center{
    text-align:center;
}

.mt-3{
    margin-top:20px;
}

.w-100{
    width:100%;
}

</style>
</head>

<body>

<nav class="navbar">
<a href="#" class="navbar-brand">Sistema Web</a>

<div class="nav-links">
<a href="{% url 'lista-clientes' %}">Clientes</a>
<a href="{% url 'lista-produtos' %}">Produtos</a>
<a href="{% url 'lista-fornecedores' %}">Fornecedores</a>
</div>
</nav>

<main class="container">
{% block content %}
{% endblock %}
</main>

</body>
</html>
