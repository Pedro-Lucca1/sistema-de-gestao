{% extends 'base.html' %}

{% block content %}

<div class="d-flex">
    <h2 style="color: var(--primary);">Registro de Dados</h2>
</div>

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <div class="mt-3">

        <button type="submit" class="btn btn-success w-100">
            Salvar Informações
        </button>

        <button 
            type="button"
            class="btn w-100 mt-3"
            style="background: var(--accent);"
            onclick="history.back()">

            Voltar sem salvar
        </button>

    </div>

</form>

{% endblock %}
